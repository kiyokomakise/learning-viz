function pattern(tot,ss){
  const pA=p_(ss,"A"),pB=p_(ss,"B"),pC=p_(ss,"C");
  if(pC>=0.85&&pB<0.5&&pA<0.7)return["苦手の自覚は高い一方、強みと興味がまだ言語化できていない状態です。","このままでは消去法で仕事を選んでしまうリスクがあります。","B章（強み）に戻り、人から感謝・評価された場面を3つ書き出してください。"];
  if(pA>=0.8&&pB<0.4)return["興味は高水準ですが、自分の強みの言語化が大きく不足しています。","「やりたい仕事」はあるのに「採用される理由」がまだ言葉になっていない状態です。","B章の強み整理を最優先にしてください。"];
  const lk=Object.keys(MX).sort((a,b)=>p_(ss,a)-p_(ss,b))[0];
  const ln=SEC.find(s=>s.k===lk)?.t||"";
  return[`合計${tot}点（${Math.round(tot/MAX*100)}%）です。`,`特に${ln}の点数が低い状態です。`,`${ln}の中で最も気になった項目を1つ選んで、今週中に具体的なアクションを1つ実行してください。`];
}

function makeBody(name,sid,job,total,jobScore,jobMax,ss,paras){
  const j=jg(total),dt=new Date().toLocaleString("ja-JP");
  const jobInfo=job?`\n希望職種: ${job.label}\n職種理解度: ${jobScore}/${jobMax}点 (${Math.round(jobScore/jobMax*100)}%)`:"";
  const secLines=SEC.map(s=>{const sc=ss[s.k]||0,mx=MX[s.k],pt=Math.round(sc/mx*100);return `${s.t}: ${sc}/${mx}点 (${pt}%)${pt<50?" ★要確認":""}`;}).join("\n");
  const ana=(paras||[]).map((p,i)=>`[${i+1}] ${p}`).join("\n\n");
  return `訓練生: ${name}${sid?` (ID:${sid})`:""}\n提出日時: ${dt}\n合計点: ${total}/106点（${j.l}）${jobInfo}\n\n■ セクション別スコア\n${secLines}\n\n■ 自動分析\n${ana}\n\n---\nITビジネス・Webデザイン養成科 チェックリストシステム`;
}
function makeMailto(email,name,total,job,jobScore,jobMax,ss,paras){
  const j=jg(total);
  const jobTxt=job?` [${job.label}: ${jobScore}/${jobMax}]`:"";
  return `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(`【チェックリスト提出】${name} ${total}/106点（${j.l}）${jobTxt}`)}&body=${encodeURIComponent(makeBody(name,"",job,total,jobScore,jobMax,ss,paras))}`;
}

// ── ゲージ ────────────────────────────────────────────────────
function Gauge({score,max,size=80,color="#2E75B6"}){
  const r=size/2-7,ci=2*Math.PI*r,da=score/max*ci;
  return h("div",{style:{position:"relative",width:size,height:size,flexShrink:0}},
    h("svg",{width:size,height:size},
      h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:"#e0e0e0",strokeWidth:5}),
      h("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:color,strokeWidth:5,
        strokeDasharray:`${da} ${ci-da}`,strokeLinecap:"round",transform:`rotate(-90 ${size/2} ${size/2})`})),
    h("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},
      h("span",{style:{fontSize:size>70?20:14,fontWeight:500,color}},[score]),
      h("span",{style:{fontSize:9,color:"#888"}},["/",max]))
  );
}
function Mkb({val,active,onClick}){
  const cl={"○":"am","△":"as","×":"ab"}[val]||"";
  return h("button",{className:`mb ${active===val?cl:""}`,onClick:()=>onClick(active===val?"":val)},val);
}

  const heads=["① スコアが示すこと","② ミスマッチリスク","③ 今すぐ取り組むこと"];

// ── 訓練生メイン ─────────────────────────────────────────────
function Student({onDone}){
  const [phase,setPhase]=useState("jobSelect"); // jobSelect→jobReality→jobCheck→main
  const [job,setJob]=useState(null);
  const [jobResult,setJobResult]=useState(null);
  const [nm,setNm]=useState(""),[sd,setSd]=useState(""),[ans,setAns]=useState(iA()),
        [idx,setIdx]=useState(0),[sv,setSv]=useState(false);

  if(phase==="jobSelect")return h(JobSelect,{onSelect:j=>{setJob(j);setPhase("jobReality");}});
  if(phase==="jobReality")return h(JobReality,{job,onNext:d=>{if(d==="back")setPhase("jobSelect");else setPhase("jobCheck");}});
  if(phase==="jobCheck")return h(JobCheck,{job,onNext:r=>{setJobResult(r);setPhase("main");}});

  const tot=cT(ans),fil=cF(ans),sec=SEC[idx];
  const ns=SEC.slice(0,idx).reduce((s,x)=>s+x.it.length,0)+1;
  const sa=(k,i,v)=>setAns(prev=>{const a=[...(prev[k]||[])];a[i]=v;return{...prev,[k]:a}});

  const submit=async()=>{
    if(!nm.trim()){alert("名前を入力してください");return}
    if(fil<TOTAL&&!window.confirm(`未回答が${TOTAL-fil}項目あります。提出しますか？`))return;
    setSv(true);
    const ss=Object.fromEntries(SEC.map(s=>[s.k,cS(ans,s.k)]));
    try{
      await gasGet({
        action:'save',name:nm.trim(),sid:sd,
        score:tot,...ss,answered:fil,
        date:new Date().toISOString(),
        answers:encodeAnswers(ans),
        job:job?.id||"",jobLabel:job?.label||"",
        jobScore:jobResult?.score||0,jobMax:jobResult?.max||0
      });
    }catch(e){console.warn('GAS保存失敗:',e);}
    setSv(false);
    onDone({name:nm.trim(),sid:sd,total:tot,ss,filled:fil,job,jobScore:jobResult?.score||0,jobMax:jobResult?.max||0});
  };

  return h("div",{style:{padding:"16px 16px 32px"}},
    job&&h("div",{style:{background:job.bg,border:`1px solid ${job.color}`,borderRadius:8,padding:"8px 12px",marginBottom:12,display:"flex",alignItems:"center",gap:8}},
      h("i",{"aria-hidden":"true",className:`ti ${job.icon}`,style:{fontSize:16,color:job.color}}),
      h("span",{style:{fontSize:13,color:job.color,fontWeight:500}},job.label),
      h("span",{style:{fontSize:12,color:"#595959",marginLeft:"auto"}},[`職種チェック: ${jobResult?.score||0}/${jobResult?.max||0}点`])
    ),
    h("div",{className:"card",style:{marginBottom:12}},
      h("div",{style:{fontSize:12,color:"#595959",marginBottom:8}},"受講生情報"),
      h("div",{style:{display:"flex",gap:10}},
        h("div",{style:{flex:2}},
          h("label",{style:{fontSize:11,color:"#595959"}},"名前 "),h("span",{style:{color:"#E53935"}},"*"),
          h("input",{type:"text",value:nm,onChange:ev=>setNm(ev.target.value),placeholder:"山田 太郎",style:{marginTop:4}})),
        h("div",{style:{flex:1}},
          h("label",{style:{fontSize:11,color:"#595959"}},"受講生ID"),
          h("input",{type:"text",value:sd,onChange:ev=>setSd(ev.target.value),placeholder:"001",style:{marginTop:4}}))
      )
    ),
    h("div",{style:{display:"flex",gap:10,marginBottom:12}},
      h("div",{className:"card",style:{flex:1}},
        h("div",{style:{fontSize:11,color:"#595959",marginBottom:6}},"進捗"),
        h("div",{className:"pb"},h("div",{className:"pf",style:{width:`${fil/TOTAL*100}%`}})),
        h("div",{style:{fontSize:12,fontWeight:500,marginTop:5}},[fil," / ",TOTAL," 項目"])),
      h("div",{className:"card",style:{display:"flex",alignItems:"center",gap:10}},
        h(Gauge,{score:cT(ans),max:MAX,size:72}),
        h("div",{style:{fontSize:11,color:"#595959"}},"現在の",h("br"),"スコア"))
    ),
    h("div",{style:{display:"flex",flexWrap:"wrap",gap:4,marginBottom:10}},
      SEC.map((s,i)=>{
        const f=(ans[s.k]||[]).filter(v=>v!=="").length===s.it.length;
        return h("button",{key:s.k,className:`tb${i===idx?" on":f?" ok":""}`,onClick:()=>setIdx(i)},[s.k,f?" ✓":""]);
      })
    ),
    h("div",{className:"card",style:{marginBottom:12}},
      h("div",{style:{background:"#1F4E79",color:"#fff",padding:"8px 12px",borderRadius:6,marginBottom:12}},
        h("div",{style:{fontSize:10,opacity:.75}},sec.ch),
        h("div",{style:{fontSize:14,fontWeight:500}},sec.t)
      ),
      sec.it.map((item,i)=>{
        const no=ns+i,v=(ans[sec.k]||[])[i]||"";
        return h("div",{key:i,className:"ir"},
          h("div",{className:"in",style:{background:v?"#1F4E79":"#e0e0e0",color:v?"#fff":"#888"}},no),
          h("div",{style:{flex:1,fontSize:13,lineHeight:1.6,color:"#1a1a1a"}},item),
          h("div",{style:{display:"flex",gap:4,flexShrink:0}},
            ["○","△","×"].map(val=>h(Mkb,{key:val,val,active:v,onClick:nv=>sa(sec.k,i,nv)}))
          )
        );
      })
    ),
    h("div",{style:{display:"flex",justifyContent:"space-between"}},
      h("button",{className:"bg",onClick:()=>setIdx(Math.max(0,idx-1)),disabled:idx===0,style:{opacity:idx===0?.35:1}},"← 前へ"),
      idx<SEC.length-1
        ?h("button",{className:"bp",onClick:()=>setIdx(idx+1)},"次へ →")
        :h("button",{className:"bp",onClick:submit,disabled:sv,style:{background:sv?"#888":"#1F4E79",padding:"10px 24px",fontSize:14}},sv?"送信中…":"提出する")
    )
  );
}

        [sl,setSl]=useState(null),[instEmail,setIE]=useState(""),[saved,setSaved]=useState(false);

  const saveEmail=async()=>{await gasGet({action:'setEmail',email:instEmail.trim()}).catch(()=>{});setSaved(true);setTimeout(()=>setSaved(false),2000);};

  const sendOne=(s)=>{
    if(!instEmail){alert("メールアドレスを設定してください");return}
    const ss=s.sectionScores||{};const paras=pattern(s.totalScore,ss);
    const job=JOBS.find(j=>j.id===s.jobId)||null;
    window.open(makeMailto(instEmail,s.name,s.totalScore,job,s.jobScore||0,s.jobMax||0,ss,paras));
  };
  const csv=()=>{
    const heads=["名前","ID","日時","合計","判定","希望職種","職種スコア","職種Max","A","B","C","D","E","F","G","回答数"];
    const rows=sb.map(s=>[s.name,s.studentId||"",new Date(s.date).toLocaleString("ja-JP"),s.totalScore,s.judgment,s.jobLabel||"",s.jobScore||0,s.jobMax||0,...["A","B","C","D","E","F","G"].map(k=>s.sectionScores?.[k]??0),s.answered??""]);
    const c=[heads,...rows].map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
    const blob=new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`checklist_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  };

  if(!at)return h("div",{style:{maxWidth:320,margin:"60px auto",padding:"0 16px"}},
    h("div",{className:"card",style:{textAlign:"center",padding:"32px 24px"}},
      h("i",{"aria-hidden":"true",className:"ti ti-lock",style:{fontSize:36,color:"#1F4E79",display:"block",marginBottom:16}}),
      h("div",{style:{fontSize:16,fontWeight:500,marginBottom:20}},"講師ログイン"),
      h("input",{type:"password",value:pw,onChange:ev=>setPw(ev.target.value),onKeyDown:ev=>ev.key==="Enter"&&(pw===PW?(setAt(true),load()):alert("パスワードが違います")),placeholder:"パスワードを入力",style:{marginBottom:12,textAlign:"center",fontSize:15}}),
      h("button",{className:"bp",onClick:()=>pw===PW?(setAt(true),load()):alert("パスワードが違います"),style:{width:"100%",padding:12,fontSize:14}},"ログイン"),
      h("div",{style:{marginTop:12,fontSize:11,color:"#888"}},"初期PW: sensei2026")
    )
  );

  return h("div",{style:{padding:"16px 16px 32px"}},
    h("div",{className:"card",style:{marginBottom:14,background:"#FFF3E0",border:"1px solid #FFB74D"}},
      h("div",{style:{fontSize:12,fontWeight:500,color:"#E65100",marginBottom:10}},h("i",{"aria-hidden":"true",className:"ti ti-mail",style:{marginRight:4}}),"メール通知設定"),
      h("div",{style:{display:"flex",gap:8}},
        h("input",{type:"email",value:instEmail,onChange:ev=>setIE(ev.target.value),placeholder:"講師のメールアドレス",style:{flex:1}}),
        h("button",{className:"bm",onClick:saveEmail},saved?"✓ 保存済み":"保存")
      )
    ),
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
      h("div",null,h("div",{style:{fontSize:15,fontWeight:500}},"講師ダッシュボード"),h("div",{style:{fontSize:12,color:"#595959"}},[sb.length," 件の提出"])),
      h("div",{style:{display:"flex",gap:8}},
        h("button",{className:"bg",onClick:load,style:{fontSize:12}},h("i",{"aria-hidden":"true",className:"ti ti-refresh",style:{marginRight:4}}),"更新"),
        h("button",{className:"bg",onClick:csv,disabled:sb.length===0,style:{fontSize:12}},h("i",{"aria-hidden":"true",className:"ti ti-download",style:{marginRight:4}}),"CSV")
      )
    ),
    ld?h("div",{style:{textAlign:"center",padding:40,color:"#595959"}},"読み込み中…")
    :sb.length===0?h("div",{className:"card",style:{textAlign:"center",padding:40,color:"#595959"}},"まだ提出がありません")
    :h("div",{className:"card",style:{padding:0,overflow:"hidden"}},
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 100px 60px 108px 48px 32px 24px",gap:4,padding:"8px 14px",background:"#1F4E79",fontSize:11,fontWeight:500,color:"rgba(255,255,255,0.9)"}},
        h("div",null,"名前 / 提出日時"),h("div",{style:{textAlign:"center"}},"希望職種"),h("div",{style:{textAlign:"center"}},"合計"),h("div",{style:{textAlign:"center"}},"判定"),h("div",{style:{textAlign:"center"}},"回答"),h("div",null),h("div",null)
      ),
      sb.flatMap((s,i)=>{
        const j2=jg(s.totalScore),isSel=sl?.rowIndex===s.rowIndex;
        const job=JOBS.find(j=>j.id===s.jobId)||null;
        const jobPct=s.jobMax>0?Math.round((s.jobScore||0)/s.jobMax*100):null;
        const rows=[h("div",{key:s.rowIndex,className:`sb${isSel?" sel":""}`,
          onClick:()=>setSl(isSel?null:s),
          style:{background:isSel?"#EEF5FF":i%2===0?"#fff":"#f5f5f5",gridTemplateColumns:"1fr 100px 60px 108px 48px 32px 24px"}},
          h("div",null,
            h("div",{style:{fontSize:13,fontWeight:500}},[s.name,s.studentId?` (${s.studentId})`:""]),
            h("div",{style:{fontSize:10,color:"#888"}},new Date(s.date).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}))),
          h("div",{style:{textAlign:"center"}},job?h("span",{style:{fontSize:10,padding:"2px 6px",borderRadius:4,background:job.bg,color:job.color,fontWeight:500}},job.label.slice(0,6)+"…"):h("span",{style:{fontSize:11,color:"#bbb"}},"―")),
          h("div",{style:{textAlign:"center",fontSize:18,fontWeight:500,color:j2.c}},s.totalScore),
          h("div",{style:{textAlign:"center"}},h("span",{style:{padding:"2px 6px",borderRadius:4,fontSize:11,fontWeight:500,background:j2.bg,color:j2.c}},j2.l)),
          h("div",{style:{textAlign:"center",fontSize:12,color:"#888"}},[s.answered??"-","/",TOTAL]),
          h("button",{onClick:ev=>{ev.stopPropagation();sendOne(s);},style:{background:"none",border:"none",color:"#C55A11",fontSize:16,padding:2,cursor:"pointer"},title:"メール送信"},h("i",{"aria-hidden":"true",className:"ti ti-mail"})),
          h("button",{onClick:ev=>{ev.stopPropagation();del(s);},style:{background:"none",border:"none",color:"#bbb",fontSize:15,padding:2}},"×")
        )];
        if(isSel)rows.push(h("div",{key:s.rowIndex+"_d",style:{padding:"14px 16px",background:"#F0F6FF",borderBottom:"0.5px solid rgba(0,0,0,0.1)",gridColumn:"1/-1"}},
          h("div",{style:{fontSize:12,fontWeight:500,color:"#1F4E79",marginBottom:10}},[s.name," さんの詳細"]),
          job&&jobPct!==null&&h("div",{style:{marginBottom:12,padding:"10px 12px",background:job.bg,borderRadius:6}},
            h("div",{style:{fontSize:12,fontWeight:500,color:job.color,marginBottom:4}},[`職種別チェック（${job.label}）：${s.jobScore||0}/${s.jobMax||0}点（${jobPct}%）`]),
            jobPct<60&&h("div",{style:{fontSize:12,color:"#C62828"}},h("i",{"aria-hidden":"true",className:"ti ti-alert-triangle",style:{marginRight:4}}), "仕事理解が不足しています。面談で確認してください。")
          ),
          h("div",{style:{fontSize:12,fontWeight:500,color:"#595959",marginBottom:8}},"自己理解・仕事理解 セクション別"),
          SEC.map(sec=>{
            const sc=cS(s.answers||{},sec.k),mx=MX[sec.k],pt=sc/mx*100;
            const fc=pt>=80?"#4CAF50":pt>=60?"#FFC107":"#EF5350";
            return h("div",{key:sec.k,style:{marginBottom:8}},
              h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:3}},
                h("span",{style:{fontSize:11,color:"#595959"}},sec.t),
                h("span",{style:{fontSize:11,fontWeight:500,color:fc}},[sc,"/",mx])),
              h("div",{className:"secb"},h("div",{className:"secf",style:{width:`${pt}%`,background:fc}})));
          })
        ));
        return rows;
      })
    )
  );
}

// ── アプリ本体 ───────────────────────────────────────────────
